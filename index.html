<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUREX GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #020617; }</style>
</head>
<body class="text-white">
    <nav class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
        <div class="text-2xl font-bold text-blue-500">LOUREX</div>
        <select id="langSwitcher" class="bg-slate-800 p-2 rounded text-sm text-white">
            <option value="ar">العربية 🇸🇦</option>
            <option value="tr">Türkçe 🇹🇷</option>
            <option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option>
        </select>
    </nav>

    <header class="py-10 text-center">
        <h1 id="heroTitle" class="text-3xl font-bold">بوابتك العالمية للتجارة</h1>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <div id="productsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // استبدل هذه بالقيم الحقيقية من Supabase
        const SUPABASE_URL = 'ضع_هنا_URL'; 
        const SUPABASE_KEY = 'ضع_هنا_KEY';
        
        // تأكد من وجود الرمز _ قبل supabase لتجنب تضارب الأسماء
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const lang = document.getElementById('langSwitcher').value;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';

            const { data, error } = await _client.from('products').select('*');
            
            if (error) {
                console.error("خطأ:", error.message);
                return;
            }

            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            data.forEach(p => {
                container.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div class="h-40 bg-slate-700 rounded-2xl mb-4 flex items-center justify-center text-4xl">
                            ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover rounded-2xl">` : '📦'}
                        </div>
                        <h3 class="text-xl font-bold">${p['name_' + lang] || p.name_en}</h3>
                        <p class="text-blue-400 font-bold mt-2 font-mono">${p.price_usd} USD</p>
                    </div>
                `;
            });
        }

        document.getElementById('langSwitcher').addEventListener('change', loadProducts);
        window.onload = loadProducts;
    </script>
</body>
</html>
