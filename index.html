<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUREX | المنصة التجارية العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .page-section { display: none; min-height: 80vh; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); }
        .product-card { transition: 0.3s; border: 1px solid #e2e8f0; background: white; }
        .product-card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .cart-sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; transform: translateX(100%); }
        .cart-sidebar.open { transform: translateX(0); }
        [dir="ltr"] .cart-sidebar { transform: translateX(-100%); }
        [dir="ltr"] .cart-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-[1000] shadow-xl text-white">
        <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-3xl font-black italic tracking-tighter cursor-pointer text-blue-500" onclick="showSection('home')">LOUREX</div>
            
            <div class="hidden lg:flex gap-8 font-bold text-sm uppercase">
                <span onclick="showSection('home')" class="cursor-pointer hover:text-blue-400" id="nav-home">الرئيسية</span>
                <span onclick="showSection('shop')" class="cursor-pointer hover:text-blue-400" id="nav-shop">المتجر</span>
                <span onclick="showSection('track')" class="cursor-pointer hover:text-blue-400" id="nav-track">التتبع</span>
            </div>

            <div class="flex items-center gap-4">
                <select id="langSwitcher" onchange="translatePage()" class="bg-slate-800 border-none rounded-lg p-2 text-xs font-bold outline-none cursor-pointer">
                    <option value="ar">العربية 🇸🇦</option>
                    <option value="tr">Türkçe 🇹🇷</option>
                    <option value="en">English 🇺🇸</option>
                </select>
                <div class="relative cursor-pointer bg-blue-600 p-2 rounded-xl" onclick="toggleCart()">
                    <span>🛒</span>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6">
        
        <section id="section-home" class="page-section active">
            <div class="py-20 text-center">
                <h1 id="hero-title" class="text-5xl md:text-8xl font-black mb-8 bg-gradient-to-r from-blue-600 to-emerald-500 bg-clip-text text-transparent italic">LOUREX GLOBAL</h1>
                <p id="hero-desc" class="text-slate-500 text-xl max-w-2xl mx-auto mb-10">بوابتك الذكية لاستيراد المنتجات والحلويات من تركيا والصين إلى الرياض.</p>
                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="showSection('shop')" id="btn-shop" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">ابدأ التسوق</button>
                    <button onclick="window.open('https://wa.me/905392411642')" class="bg-white border border-slate-200 px-10 py-4 rounded-2xl font-black">تواصل مباشر</button>
                </div>
            </div>
        </section>

        <section id="section-shop" class="page-section">
            <div class="flex items-center gap-4 mb-10">
                <input type="text" id="searchInput" onkeyup="search()" placeholder="ابحث..." class="flex-1 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 ring-blue-500">
            </div>
            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <section id="section-track" class="page-section py-20">
            <div class="max-w-xl mx-auto bg-white p-12 rounded-[3rem] shadow-xl text-center border border-blue-50">
                <h2 class="text-3xl font-black mb-6 italic" id="track-title">تتبع شحنتك</h2>
                <input type="text" placeholder="LX-0000" class="w-full p-5 rounded-2xl border mb-6 text-center text-2xl font-mono outline-none focus:ring-2 ring-blue-500">
                <button class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black" id="btn-track">استعلام</button>
            </div>
        </section>
    </main>

    <div id="sideCart" class="fixed top-0 right-0 h-full w-[380px] bg-white shadow-2xl cart-sidebar p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic text-blue-600 uppercase">Cart</h2>
            <button onclick="toggleCart()" class="text-3xl text-slate-300">×</button>
        </div>
        <div id="cartItems" class="space-y-4 overflow-y-auto max-h-[60vh]"></div>
        <div class="absolute bottom-10 left-8 right-8 border-t pt-8">
            <div class="flex justify-between text-xl font-black mb-6">
                <span id="txt-total">الإجمالي:</span>
                <span id="cartTotal">0.00 $</span>
            </div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg" id="btn-checkout">تأكيد الطلب (WhatsApp)</button>
        </div>
    </div>

    <footer class="bg-slate-950 text-slate-500 py-16 px-6 mt-20 text-center">
        <div class="max-w-7xl mx-auto">
            <div class="text-3xl font-black text-white italic mb-6">LOUREX</div>
            <p class="text-sm mb-8" id="footer-addr">الرياض - إسطنبول - قوانزو</p>
            <p class="text-blue-500 font-bold mb-10" dir="ltr">WhatsApp: +90 539 241 16 42</p>
            <div class="text-[10px] uppercase tracking-widest">© 2026 LOUREX GLOBAL. ALL RIGHTS RESERVED.</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'ضع_رابط_مشروعك_هنا';
        const SUPABASE_KEY = 'ضع_مفتاح_API_هنا';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let cart = [];

        // 1. نظام الترجمة الفوري
        const translations = {
            ar: {
                home: "الرئيسية", shop: "المتجر", track: "التتبع", heroT: "لويركس العالمية",
                heroD: "بوابتك لاستيراد الحلويات والمنتجات من تركيا والصين.", btnS: "ابدأ التسوق",
                trackT: "تتبع شحنتك", btnT: "استعلام", total: "الإجمالي:", btnC: "تأكيد عبر واتساب",
                addr: "الرياض - إسطنبول - قوانزو"
            },
            tr: {
                home: "Anasayfa", shop: "Mağaza", track: "Takip", heroT: "LOUREX GLOBAL",
                heroD: "Türkiye ve Çin'den ürün ithalatı için akıllı kapınız.", btnS: "Alışverişe Başla",
                trackT: "Kargonuzu Takip Edin", btnT: "Sorgula", total: "Toplam:", btnC: "WhatsApp ile Onayla",
                addr: "Riyad - İstanbul - Guangzhou"
            },
            en: {
                home: "Home", shop: "Shop", track: "Track", heroT: "LOUREX GLOBAL",
                heroD: "Your smart gateway for importing products from Turkey and China.", btnS: "Start Shopping",
                trackT: "Track Cargo", btnT: "Query", total: "Total:", btnC: "Confirm via WhatsApp",
                addr: "Riyadh - Istanbul - Guangzhou"
            }
        };

        function translatePage() {
            const lang = document.getElementById('langSwitcher').value;
            const t = translations[lang];
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-shop').innerText = t.shop;
            document.getElementById('nav-track').innerText = t.track;
            document.getElementById('hero-title').innerText = t.heroT;
            document.getElementById('hero-desc').innerText = t.heroD;
            document.getElementById('btn-shop').innerText = t.btnS;
            document.getElementById('track-title').innerText = t.trackT;
            document.getElementById('btn-track').innerText = t.btnT;
            document.getElementById('txt-total').innerText = t.total;
            document.getElementById('btn-checkout').innerText = t.btnC;
            document.getElementById('footer-addr').innerText = t.addr;
            
            renderProducts(allProducts);
        }

        // 2. إدارة البيانات والمنتجات
        async function loadData() {
            const { data } = await _client.from('products').select('*');
            if (data) { allProducts = data; renderProducts(data); }
        }

        function renderProducts(products) {
            const lang = document.getElementById('langSwitcher').value;
            const container = document.getElementById('productsGrid');
            container.innerHTML = '';

            products.forEach(p => {
                const price = p.price_usd || 0.00;
                container.innerHTML += `
                    <div class="product-card p-6 rounded-[2.5rem] flex flex-col">
                        <div class="h-48 bg-slate-100 rounded-3xl mb-4 overflow-hidden flex items-center justify-center text-4xl">
                            ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '🍪'}
                        </div>
                        <h3 class="font-bold text-sm mb-4">${p['name_' + lang] || p.name_en}</h3>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-xl font-black text-blue-600">${price} $</span>
                            <button onclick="addToCart('${p.id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 transition">ADD</button>
                        </div>
                    </div>
                `;
            });
        }

        // 3. السلة والبحث والتنقل
        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
        }

        function toggleCart() {
            document.getElementById('sideCart').classList.toggle('open');
        }

        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
            updateCartUI();
        }

        function updateCartUI() {
            const itemsDiv = document.getElementById('cartItems');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += parseFloat(item.price_usd || 0);
                itemsDiv.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                        <span class="text-xs font-bold">${item.name_en}</span>
                        <button onclick="cart.splice(${index},1); updateCartUI();" class="text-red-500">×</button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = total.toFixed(2) + ' $';
        }

        function search() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => (p.name_en + p.name_ar).toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function checkout() {
            const message = encodeURIComponent("طلب جديد من LOUREX:\n" + cart.map(i => i.name_en).join('\n'));
            window.open(`https://wa.me/905392411642?text=${message}`);
        }

        window.onload = loadData;
    </script>
</body>
</html>
