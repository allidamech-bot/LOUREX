<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUREX Global Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f1f5f9; }
.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px;}
</style>
</head>

<body>

<header class="bg-black text-white p-4 flex justify-between items-center">
<h1 class="text-2xl font-bold">LOUREX</h1>

<div class="flex gap-3">
<select id="lang" onchange="renderProducts()" class="text-black p-1">
<option value="ar">AR</option>
<option value="en">EN</option>
<option value="tr">TR</option>
<option value="zh">中文</option>
</select>

<button onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
</div>
</header>

<div class="p-4">
<input id="search" onkeyup="renderProducts()" placeholder="بحث..." class="w-full p-3 mb-4 rounded border">
<div id="products" class="product-grid"></div>
</div>

<!-- CART -->
<div id="cart" style="display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:white; padding:20px; overflow:auto;">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="checkout()" style="background:green;color:white;padding:10px;width:100%">طلب عبر واتساب</button>
</div>

<script>

// PRODUCTS DATABASE (محلي)
let products = [
{
id:1,
name:{ar:"بسكويت شوكولاتة",en:"Chocolate Biscuits",tr:"Çikolatalı Bisküvi",zh:"巧克力饼干"},
price:10,
category:"food"
},
{
id:2,
name:{ar:"حلوى جيلي",en:"Jelly Candy",tr:"Jel Şeker",zh:"果冻糖"},
price:8,
category:"food"
}
];

let cart=[];

// عرض المنتجات
function renderProducts(){
let lang=document.getElementById("lang").value;
let search=document.getElementById("search").value.toLowerCase();

let html="";

products.forEach(p=>{
if(p.name[lang].toLowerCase().includes(search)){
html+=`
<div style="background:white;padding:10px;border-radius:10px;">
<h3>${p.name[lang]}</h3>
<p>${p.price} $</p>
<button onclick="addToCart(${p.id})">🛒</button>
</div>`;
}
});

document.getElementById("products").innerHTML=html;
}

// سلة
function addToCart(id){
let p=products.find(x=>x.id==id);
cart.push(p);
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
total+=p.price;
html+=`
<div>
${p.name.en} - ${p.price}
<button onclick="removeItem(${i})">❌</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: "+total;
document.getElementById("cartCount").innerText=cart.length;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display = (c.style.display=="none")?"block":"none";
}

// طلب واتساب
function checkout(){
let text="طلب جديد:%0A";

cart.forEach(p=>{
text+=p.name.en+" - "+p.price+"$%0A";
});

window.open("https://wa.me/966XXXXXXXXX?text="+text);
}

// تشغيل
renderProducts();

</script>

</body>
</html>
